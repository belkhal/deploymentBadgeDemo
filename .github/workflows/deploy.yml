name: Deploy to dev
on:
  push:
    paths:
      - force-app/**
    branches:
      - develop
jobs:
  deploy-to-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v3
        with:
          node-version: "14"
      - name: Checkout source code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Install Salesforce CLI
        run: |
          wget -q https://developer.salesforce.com/media/salesforce-cli/sf/channels/stable/sf-linux-x64.tar.xz -O sf.tar.xz
          mkdir -p ~/sf
          tar xJf sf.tar.xz -C ~/sf --strip-components 1
          echo "$HOME/sf/bin" >> $GITHUB_PATH
          ~/sf/bin/sf version
      - name: Populate auth file with SFDX_URL secret of target org
        run: |
          echo ${{ secrets.SFDX_URL}} > ./SFDX_URL.txt
      - name: Authenticate to target Org
        run: sf org login sfdx-url --sfdx-auth-file ./SFDX_URL.txt --set-default --alias targetOrg
      - name: Installing sfdx git delta
        run: |
          echo y | sf plugins install sfdx-git-delta
          sf plugins
      - name: Create delta packages for new, modified or deleted metadata
        run: |
          mkdir -p changed-sources
          sf sgd:source:delta --to "HEAD" --from "HEAD^" --output changed-sources/ --generate-delta --source force-app/ 
      - name: Installing java
        run: sudo apt-get update && sudo apt-get install default-jdk
      - name: Installing SFDX scanner
        run: sf plugins install @salesforce/sfdx-scanner
      - name: Scan code
        run: sf scanner run --format sarif --target 'changed-sources/**/*.cls' --category 'Design,Best Practices,Performance,Security' --outfile apexScanResults.sarif
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v1
        with:
          sarif_file: apexScanResults.sarif
      - name: Deployment - run all tests
        run: sf project deploy start --source-dir changed-sources/force-app --test-level RunLocalTests --json
