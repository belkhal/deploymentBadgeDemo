name: Deploy to orgs
on:
  push:
    paths:
      - force-app/**
    branches:
      - develop

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      healthcare: ${{ steps.filter.outputs.healthcare }}
      finance: ${{ steps.filter.outputs.finance }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            core:
              - 'force-app/core/**'
            healthcare:
              - 'force-app/healthcare/**'
            finance:
              - 'force-app/finance/**'

  deploy-healthcare:
    needs: detect-changes
    if: needs.detect-changes.outputs.core == 'true' || needs.detect-changes.outputs.healthcare == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "14"
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install Salesforce CLI
        run: |
          wget -q https://developer.salesforce.com/media/salesforce-cli/sf/channels/stable/sf-linux-x64.tar.xz -O sf.tar.xz
          mkdir -p ~/sf
          tar xJf sf.tar.xz -C ~/sf --strip-components 1
          echo "$HOME/sf/bin" >> $GITHUB_PATH
          ~/sf/bin/sf version
      - name: Authenticate to Healthcare Org
        run: |
          echo ${{ secrets.SFDX_URL_HEALTHCARE }} > ./AUTH.txt
          sf org login sfdx-url --sfdx-url-file ./AUTH.txt --set-default --alias healthcareOrg
      - name: Deploy Core to Healthcare Org
        if: needs.detect-changes.outputs.core == 'true'
        run: sf project deploy start --source-dir force-app/core --target-org healthcareOrg --json
      - name: Deploy Healthcare to Healthcare Org
        if: needs.detect-changes.outputs.healthcare == 'true'
        run: sf project deploy start --source-dir force-app/healthcare --target-org healthcareOrg --json

  deploy-finance:
    needs: detect-changes
    if: needs.detect-changes.outputs.core == 'true' || needs.detect-changes.outputs.finance == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "14"
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install Salesforce CLI
        run: |
          wget -q https://developer.salesforce.com/media/salesforce-cli/sf/channels/stable/sf-linux-x64.tar.xz -O sf.tar.xz
          mkdir -p ~/sf
          tar xJf sf.tar.xz -C ~/sf --strip-components 1
          echo "$HOME/sf/bin" >> $GITHUB_PATH
          ~/sf/bin/sf version
      - name: Authenticate to Finance Org
        run: |
          echo ${{ secrets.SFDX_URL_FINANCE }} > ./AUTH.txt
          sf org login sfdx-url --sfdx-url-file ./AUTH.txt --set-default --alias financeOrg
      - name: Deploy Core to Finance Org
        if: needs.detect-changes.outputs.core == 'true'
        run: sf project deploy start --source-dir force-app/core --target-org financeOrg --json
      - name: Deploy Finance to Finance Org
        if: needs.detect-changes.outputs.finance == 'true'
        run: sf project deploy start --source-dir force-app/finance --target-org financeOrg --json
